# ==========================================
# Optimized Cloud Build Configuration
# ==========================================
# This configuration uses Google Artifact Registry for Docker layer caching
# to significantly speed up builds.
#
# Prerequisites:
# 1. Enable Artifact Registry API
# 2. Create a Docker repository:
#    gcloud artifacts repositories create docker-cache \
#      --repository-format=docker \
#      --location=europe-west1 \
#      --description="Docker cache for faster builds"
#
# 3. Grant Cloud Build access to Artifact Registry:
#    gcloud projects add-iam-policy-binding PROJECT_ID \
#      --member=serviceAccount:PROJECT_NUMBER@cloudbuild.gserviceaccount.com \
#      --role=roles/artifactregistry.writer
# ==========================================

steps:
  # ==========================================
  # Step 1: Pull previous image for layer cache
  # ==========================================
  # This step pulls the previously built image to use as a cache source
  # If it doesn't exist (first build), continue anyway
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_CACHE_IMAGE}:latest || echo "No cache image found, building from scratch"
    env:
      - 'DOCKER_BUILDKIT=1'

  # ==========================================
  # Step 2: Build with cache
  # ==========================================
  # Build using the regular Dockerfile with cache from previous build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--file=Dockerfile'
      - '--build-arg=BUILDKIT_INLINE_CACHE=1'
      - '--cache-from=${_CACHE_IMAGE}:latest'
      - '--tag=${_IMAGE_NAME}:${SHORT_SHA}'
      - '--tag=${_IMAGE_NAME}:latest'
      - '--tag=${_CACHE_IMAGE}:latest'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # ==========================================
  # Step 3: Push all tags to Artifact Registry
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-all'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE_NAME}'

  # ==========================================
  # Step 4: Push cache image
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-cache'
    args:
      - 'push'
      - '${_CACHE_IMAGE}:latest'

  # ==========================================
  # Step 5: Deploy to Cloud Run
  # ==========================================
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=GCP_PROJECT_ID=${PROJECT_ID}'
      - '--set-env-vars=GCP_LOCATION=${_REGION}'

# ==========================================
# Substitution Variables
# ==========================================
substitutions:
  _REGION: 'europe-west1'
  _SERVICE_NAME: 'ai-interview-simulator'
  _ARTIFACT_REGISTRY: 'europe-west1-docker.pkg.dev'
  _REPOSITORY: 'docker-cache'
  _IMAGE_NAME: '${_ARTIFACT_REGISTRY}/${PROJECT_ID}/${_REPOSITORY}/ai-interview-simulator'
  _CACHE_IMAGE: '${_ARTIFACT_REGISTRY}/${PROJECT_ID}/${_REPOSITORY}/ai-interview-cache'
  _SERVICE_ACCOUNT: 'ai-interview-sa@${PROJECT_ID}.iam.gserviceaccount.com'

# ==========================================
# Build Configuration
# ==========================================
options:
  # Use higher CPU machine for faster builds
  machineType: 'E2_HIGHCPU_8'

  # Use BuildKit for better caching and faster builds
  env:
    - 'DOCKER_BUILDKIT=1'

  # Increase timeout for first builds (subsequent builds will be faster)
  timeout: '1200s'  # 20 minutes

  # Use larger disk for layer cache
  diskSizeGb: 50

# ==========================================
# Build Logs
# ==========================================
# Store logs in Cloud Logging
logsBucket: 'gs://${PROJECT_ID}_cloudbuild'

# ==========================================
# Build Images
# ==========================================
# Tag images for easy identification
images:
  - '${_IMAGE_NAME}:${SHORT_SHA}'
  - '${_IMAGE_NAME}:latest'
  - '${_CACHE_IMAGE}:latest'
