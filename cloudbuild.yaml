steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ai-interview-simulator:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-interview-simulator:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-interview-simulator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-interview-simulator:$COMMIT_SHA'
      - '--region'
      - 'us-central1' # Change to your preferred region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # - '--service-account'
      # - 'YOUR_SERVICE_ACCOUNT_EMAIL' # Add your service account if needed here

images:
  - 'gcr.io/$PROJECT_ID/ai-interview-simulator:$COMMIT_SHA'

# IMPORTANT: This logging configuration fixes the error when using a custom service account
options:
  logging: CLOUD_LOGGING_ONLY
